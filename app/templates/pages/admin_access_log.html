{% extends "base.html" %}

{% block title %}접속 기록 - AI 데이터 분석{% endblock %}

{% block breadcrumb %}
  <span>Management</span>
  <span class="sep">›</span>
  <span class="current">접속 기록</span>
{% endblock %}

{% block content %}
<div class="card">
  <div class="card-title" style="margin-bottom:16px;">🛡️ 사용자 접속 기록 (감사 로그)</div>

  <!-- 필터 -->
  <div class="filter-bar">
    <div class="fb-field"><label>사번</label><input id="f-username" class="form-input" style="width:120px;" placeholder="사번" autocomplete="new-password"></div>
    <div class="fb-field"><label>부서</label><input id="f-department" class="form-input" style="width:120px;" placeholder="부서" autocomplete="new-password"></div>
    <div class="fb-field"><label>메뉴</label><input id="f-menu" class="form-input" style="width:140px;" placeholder="메뉴명" autocomplete="new-password"></div>
    <div class="fb-field"><label>동작</label>
      <select id="f-action" class="form-select" style="padding:4px 8px; font-size:13px;">
        <option value="">전체</option>
        <option value="view">메뉴 접속</option>
        <option value="login">로그인</option>
        <option value="login_fail">로그인 실패</option>
        <option value="logout">로그아웃</option>
      </select>
    </div>
    <div class="fb-field"><label>시작일</label><input id="f-from" type="date" class="form-input" autocomplete="new-password"></div>
    <div class="fb-field"><label>종료일</label><input id="f-to" type="date" class="form-input" autocomplete="new-password"></div>
    <button class="btn btn-primary" style="padding:5px 14px; font-size:13px;" onclick="search()">🔍 조회</button>
    <button class="btn btn-secondary" style="padding:5px 14px; font-size:13px;" onclick="resetFilters()">초기화</button>
  </div>

  <div id="log-status" style="font-size:13px; color:var(--text-muted); margin-bottom:12px;"></div>

  <div style="overflow-x:auto;">
    <table class="data-table" id="log-table">
      <thead>
        <tr>
          <th style="width:160px;">시각</th>
          <th style="width:110px;">사번</th>
          <th style="width:110px;">성명</th>
          <th style="width:120px;">부서</th>
          <th style="width:130px;">접속 IP</th>
          <th>메뉴</th>
          <th style="width:90px; text-align:center;">동작</th>
        </tr>
      </thead>
      <tbody id="log-tbody">
        <tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:24px;">조회 버튼을 눌러주세요.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 페이지네이션 -->
  <div style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:16px;">
    <button class="btn btn-secondary" style="padding:4px 12px; font-size:12px;" onclick="prevPage()">◀ 이전</button>
    <span id="page-info" style="font-size:13px; color:var(--text-muted);">-</span>
    <button class="btn btn-secondary" style="padding:4px 12px; font-size:12px;" onclick="nextPage()">다음 ▶</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const LIMIT = 10;
let offset = 0;
let total = 0;

const ACTION_STYLE = {
  view:       { text: '접속',     bg: '#e0f2fe', fg: '#075985' },
  login:      { text: '로그인',   bg: '#d1fae5', fg: '#065f46' },
  login_fail: { text: '로그인실패', bg: '#fee2e2', fg: '#991b1b' },
  logout:     { text: '로그아웃', bg: '#f1f5f9', fg: '#475569' },
};

document.addEventListener('DOMContentLoaded', () => { fillDefaultRange('f-from', 'f-to'); search(); });

function buildQuery(extra = {}) {
  const params = new URLSearchParams();
  const u = document.getElementById('f-username').value.trim();
  const d = document.getElementById('f-department').value.trim();
  const m = document.getElementById('f-menu').value.trim();
  const a = document.getElementById('f-action').value;
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  if (u) params.set('username', u);
  if (d) params.set('department', d);
  if (m) params.set('menu', m);
  if (a) params.set('action', a);
  if (from) params.set('date_from', from);
  if (to) params.set('date_to', to);
  for (const [k, v] of Object.entries(extra)) params.set(k, v);
  return params.toString();
}

function search() { offset = 0; load(); }
function prevPage() { if (offset >= LIMIT) { offset -= LIMIT; load(); } }
function nextPage() { if (offset + LIMIT < total) { offset += LIMIT; load(); } }

function resetFilters() {
  ['f-username','f-department','f-menu','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-action').value = '';
  search();
}

async function load() {
  const tbody = document.getElementById('log-tbody');
  const statusEl = document.getElementById('log-status');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:24px;">로딩 중...</td></tr>';

  const qs = buildQuery({ limit: LIMIT, offset });
  const res = await apiFetch('/api/admin/access-logs?' + qs);
  if (!res) return;
  if (res.status === 403) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444; padding:24px;">⛔ 관리자 권한이 필요합니다.</td></tr>';
    return;
  }
  if (!res.ok) { statusEl.textContent = '조회 실패'; return; }

  const data = await res.json();
  total = data.total;
  const items = data.items || [];
  statusEl.textContent = `총 ${total.toLocaleString()}건`;
  updatePageInfo();

  if (items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:24px;">기록이 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = items.map(r => {
    const st = ACTION_STYLE[r.action] || { text: r.action, bg: '#f1f5f9', fg: '#475569' };
    return `
      <tr>
        <td style="font-size:12px; color:var(--text-muted); white-space:nowrap;">${fmtTime(r.accessed_at)}</td>
        <td><strong>${escapeHtml(r.username)}</strong></td>
        <td>${escapeHtml(r.name || '')}</td>
        <td>${escapeHtml(r.department || '')}</td>
        <td style="font-size:12px; font-family:monospace;">${escapeHtml(r.client_ip || '')}</td>
        <td>${escapeHtml(r.menu || '')}</td>
        <td style="text-align:center;">
          <span style="font-size:11px; padding:2px 8px; border-radius:99px; background:${st.bg}; color:${st.fg}; font-weight:600; white-space:nowrap;">${st.text}</span>
        </td>
      </tr>`;
  }).join('');
}

function updatePageInfo() {
  const start = total === 0 ? 0 : offset + 1;
  const end = Math.min(offset + LIMIT, total);
  document.getElementById('page-info').textContent = `${start.toLocaleString()} – ${end.toLocaleString()} / ${total.toLocaleString()}`;
}

function fmtTime(s) {
  return s ? String(s).replace('T', ' ').slice(0, 19) : '';
}
function showToast(msg, type = 'info') {
  const bg = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#1e293b';
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:#fff;`
    + `padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s;`;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 3000);
}
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
{% endblock %}
