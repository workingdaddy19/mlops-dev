# ============================================================
# [운영] backend-secret 템플릿 (부트스트랩 + 민감값 전용)
#  - 비민감 설정(URL/리전/버킷/JUPYTER_ENVS 등)은 더 이상 여기 두지 않습니다.
#    → 앱 소스 코드 기본값(app/core/config.py) + DB(system_settings) 에서 관리하며,
#      관리자 화면(Settings)에서 수정합니다.
#  - 여기에는 DB에 담을 수 없는 부트스트랩 값과 민감값만 둡니다.
#  - 실제 값을 채워 k8s/backend-secret.yaml 로 복사 후 적용:
#      cp k8s/backend-secret.example.yaml k8s/backend-secret.yaml
#      vi k8s/backend-secret.yaml && kubectl apply -f k8s/backend-secret.yaml -n mlops
#  - 실값 파일(backend-secret.yaml)은 .gitignore 처리되어 커밋되지 않습니다.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: mlops
type: Opaque
stringData:
  # ---- RDS 접속 (DB에 담을 수 없는 부트스트랩) ----
  DB_HOST: "<RDS_ENDPOINT>"
  DB_PORT: "5432"
  DB_NAME: "mlops"
  DB_USER: "mlops"
  DB_PASSWORD: "<DB_PASSWORD>"
  # ---- 애플리케이션 마스터 키 (비밀번호 해시 pepper + JWT 서명) ----
  APP_SECRET_KEY: "<RANDOM_SECRET_KEY>"
  # ---- JupyterHub 민감값 ----
  JUPYTERHUB_ADMIN_TOKEN: "<JUPYTERHUB_ADMIN_TOKEN>"
  JUPYTERHUB_JWT_SECRET: "<JUPYTERHUB_JWT_SECRET>"
