apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-dev
  namespace: mlops
  labels:
    app: mlops-dev
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops-dev
  template:
    metadata:
      labels:
        app: mlops-dev
        env: dev
    spec:
      # 운영과 동일한 IRSA ServiceAccount 재사용 (S3/Athena 접근 권한)
      serviceAccountName: mlops-aws-access
      containers:
        - name: mlops-dev
          # ==========================================
          # 개발용 ECR 이미지
          # ==========================================
          image: 891376975666.dkr.ecr.ap-northeast-2.amazonaws.com/mlops-dev/app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 6080
          envFrom:
            - secretRef:
                name: backend-secret-dev
          # 비민감 설정은 코드 기본값 + DB(system_settings)에서 관리. AWS 리전만 일반 env.
          env:
            - name: AWS_REGION
              value: "ap-northeast-2"
            - name: AWS_DEFAULT_REGION
              value: "ap-northeast-2"
          livenessProbe:
            httpGet:
              path: /health
              port: 6080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 6080
            initialDelaySeconds: 15
            periodSeconds: 5
