# ============================================================
# [개발] backend-secret-dev 템플릿 (부트스트랩 + 민감값 전용)
#  - 비민감 설정(URL/리전/버킷 등)은 앱 소스 기본값 + DB(system_settings)에서 관리.
#  - dev는 운영과 동일 DB(mlops)를 공유합니다.
#      → SECRET_KEY 도 반드시 운영과 동일해야 합니다.
#        (비밀번호 해시가 SECRET_KEY를 salt로 사용 → 다르면 기존 사용자 로그인 실패)
#      → dev/운영이 같은 users·권한·쿼리이력 테이블을 공유함에 유의.
#  - 실값 파일(backend-secret-dev.yaml)은 .gitignore 처리되어 커밋되지 않습니다.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret-dev
  namespace: mlops
type: Opaque
stringData:
  # ---- RDS 접속 (운영과 동일 DB 공유, 부트스트랩) ----
  DB_HOST: "<RDS_ENDPOINT>"
  DB_PORT: "5432"
  DB_NAME: "mlops"
  DB_USER: "mlops"
  DB_PASSWORD: "<DB_PASSWORD>"
  # ---- 애플리케이션 마스터 키 (운영과 동일 값 필수) ----
  APP_SECRET_KEY: "<운영과_동일한_APP_SECRET_KEY>"
  # ---- JupyterHub 민감값 ----
  JUPYTERHUB_ADMIN_TOKEN: "<JUPYTERHUB_ADMIN_TOKEN>"
  JUPYTERHUB_JWT_SECRET: "<JUPYTERHUB_JWT_SECRET>"
